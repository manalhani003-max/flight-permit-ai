<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>FLIGHT PERMIT AI</title>

<!-- ✅ خريطة -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
background:#0b1a2f;
font-family:Arial;
direction:rtl;
color:white;
margin:0;
}

.container{
display:flex;
gap:20px;
padding:20px;
flex-wrap:wrap;
}

.box{
background:#12243c;
padding:20px;
border-radius:12px;
width:48%;
}

input, textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.aiBtn{background:#ff9800;color:black;}
.analyzeBtn{background:#4caf50;color:white;}

#resultBox{
background:white;
color:black;
padding:15px;
border-radius:10px;
min-height:200px;
}

iframe{
width:100%;
height:300px;
border:none;
margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="box">
<h3>📥 إدخال البيانات</h3>

<input id="name" placeholder="Operator">
<input id="reg" placeholder="Registration">
<input id="country" placeholder="Country">
<input id="from" placeholder="FROM ICAO">
<input id="to" placeholder="TO ICAO">
<input id="cargo" placeholder="Cargo">

<textarea id="pasteData" placeholder="الصقي النص هنا..."></textarea>

<button class="aiBtn" onclick="smartParse()">🧠 تحليل ذكي</button>
<button class="analyzeBtn" onclick="analyze()">✈️ تحليل الرحلة</button>

<button onclick="clearAll()" style="background:red;color:white;">
مسح 🧹
</button>

</div>

<div class="box">
<h3>📊 النتيجة</h3>
<div id="resultBox">🚀 جاهز</div>

<!-- ✅ الخريطة -->
<div id="map" style="height:300px;margin-top:10px;border-radius:10px;"></div>

<iframe id="radarFrame"></iframe>
</div>

</div>

<script>

// 🧹 مسح
function clearAll(){
document.getElementById("pasteData").value="";
document.getElementById("name").value="";
document.getElementById("reg").value="";
document.getElementById("from").value="";
document.getElementById("to").value="";
document.getElementById("cargo").value="";
document.getElementById("country").value="";
document.getElementById("resultBox").innerHTML="🚀 جاهز";
document.getElementById("map").innerHTML="";
}

// 🧠 قراءة ذكية
function smartParse(){

let text = document.getElementById("pasteData").value;

text = text.replace(/\s+/g," ").trim();

let lines = text.split("\n").map(l=>l.trim()).filter(l=>l.length>2);

// المشغل
let operator = "";
for(let line of lines){
let l = line.toLowerCase();

if(
l.includes("air") ||
l.includes("aviation") ||
l.includes("airways") ||
l.includes("charter") ||
l.includes("ltd") ||
l.includes("a.s")
){
operator = line;
break;
}
}

if(!operator) operator = lines[0] || "";

// التسجيل
let regMatch = text.match(/\b([A-Z0-9]{1,2}-[A-Z0-9]{2,5})\b/i);
let reg = regMatch ? regMatch[0].toUpperCase() : "";

// المطارات
let airports = text.match(/\b[A-Z]{4}\b/g) || [];
let ignore = ["CALL","DATE","FROM","TO","TYPE","FLIGHT"];
airports = airports.filter(a=>!ignore.includes(a));

let from = airports[0] || "";
let to = airports[1] || "";

// الشحن
let cargo = "";
if(text.toLowerCase().includes("lithium")) cargo="lithium batteries";
else if(text.toLowerCase().includes("cargo")) cargo="cargo";

// الدولة
let country = "";
if(reg.startsWith("4X")) country="israel";
if(reg.startsWith("EP")) country="iran";
if(reg.startsWith("RA")) country="russia";
if(reg.startsWith("OK")) country="czech";

// تعبئة
document.getElementById("name").value = operator;
document.getElementById("reg").value = reg;
document.getElementById("from").value = from;
document.getElementById("to").value = to;
document.getElementById("cargo").value = cargo;
document.getElementById("country").value = country;

// ✅ رسم المسار
drawRoute(from,to);

}

// ✈️ تحليل
function analyze(){

let name = document.getElementById("name").value.toLowerCase();
let reg = document.getElementById("reg").value.toUpperCase();
let country = document.getElementById("country").value.toLowerCase();
let from = document.getElementById("from").value.toUpperCase();
let to = document.getElementById("to").value.toUpperCase();
let cargo = document.getElementById("cargo").value.toLowerCase();

let risk = "منخفض 🟢";
let reasons = [];
// 🌍 قوانين المسارات (مبسطة)
let restrictedAirspace = ["LL", "EP", "SY", "UA", "RU"];

function checkAirspace(code){
return restrictedAirspace.some(r => code.startsWith(r));
}

// فحص المسار
if(checkAirspace(from) || checkAirspace(to)){
risk = "مراجعة ⚠️";
reasons.push("🌍 مسار عبر أجواء حساسة");
}
// إسرائيل
if(reg.startsWith("4X") || country.includes("israel")){
risk = "مراجعة ⚠️";
reasons.push("✈️ تسجيل/مشغل إسرائيلي - يحتاج موافقة");
}

// إيران
if(reg.startsWith("EP")){
risk = "مرفوض ❌";
reasons.push("🚫 تسجيل إيراني");
}

// مواد خطرة
if(cargo.includes("battery")){
risk = "عالي 🔴";
reasons.push("⚠️ مواد خطرة");
}

// القرار
let decision = "✔ APPROVE";
if(risk.includes("❌")) decision = "❌ REJECT";
else if(risk.includes("⚠️")) decision = "⚠️ REVIEW";

// عرض
document.getElementById("resultBox").innerHTML = `
🚨 مستوى الخطورة: ${risk}<br><br>
👤 المشغل: ${name || "غير معروف"}<br>
🛩️ التسجيل: ${reg || "غير معروف"}<br>
🌍 المسار: ${from} → ${to}<br><br>

📌 الأسباب:<br>
${reasons.length ? reasons.map(r=>"• "+r).join("<br>") : "• لا يوجد"}<br><br>

📋 القرار:<br>
${decision}
`;

// رادار
if(reg){
document.getElementById("radarFrame").src =
"https://www.flightradar24.com/search?q=" + reg;
}

}

// ✈️ رسم المسار
function drawRoute(from,to){

let coords = {
OJAI:[31.7,35.99],
HESH:[27.97,34.39],
LFKJ:[41.92,8.8],
OMSJ:[25.33,55.52],
OMAL:[24.43,54.65],
LLBG:[32.0,34.87],

// ✈️ أضيفي أي مطار جديد هون بسهولة
EGLL:[51.47,-0.45],
KJFK:[40.64,-73.78],
LFPG:[49.00,2.55],
EDDF:[50.03,8.57],
RJTT:[35.55,139.78]
};

if(!coords[from] || !coords[to]) return;

let map = L.map('map').setView(coords[from],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom: 10
}).addTo(map);

L.marker(coords[from]).addTo(map).bindPopup("FROM: "+from);
L.marker(coords[to]).addTo(map).bindPopup("TO: "+to);

L.polyline([coords[from], coords[to]]).addTo(map);

}

</script>

</body>
</html>
