<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>FLIGHT PERMIT AI</title>

<!-- خريطة -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{background:#0b1a2f;font-family:Arial;direction:rtl;color:white;margin:0;}
.container{display:flex;gap:20px;padding:20px;flex-wrap:wrap;}
.box{background:#12243c;padding:20px;border-radius:12px;width:48%;}
input, textarea{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;}
button{width:100%;padding:12px;margin-top:5px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
.aiBtn{background:#ff9800;color:black;}
.analyzeBtn{background:#4caf50;color:white;}
#resultBox{background:white;color:black;padding:15px;border-radius:10px;min-height:200px;}
iframe{width:100%;height:300px;border:none;margin-top:10px;}
</style>

</head>

<body>

<div class="container">

<div class="box">
<h3>📥 إدخال البيانات</h3>

<input id="name" placeholder="Operator">
<input id="reg" placeholder="Registration">
<input id="country" placeholder="Country">
<input id="from" placeholder="FROM ICAO">
<input id="to" placeholder="TO ICAO">
<input id="cargo" placeholder="Cargo">

<textarea id="pasteData" placeholder="الصقي النص هنا..."></textarea>

<button class="aiBtn" onclick="smartParse()">🧠 تحليل ذكي</button>
<button class="analyzeBtn" onclick="analyze()">✈️ تحليل الرحلة</button>
<button onclick="clearAll()" style="background:red;color:white;">مسح 🧹</button>

</div>

<div class="box">
<h3>📊 النتيجة</h3>
<div id="resultBox">🚀 جاهز</div>
<div id="map" style="height:300px;margin-top:10px;border-radius:10px;"></div>
<iframe id="radarFrame"></iframe>
</div>

</div>

<script>

// 🧹 مسح
function clearAll(){
pasteData.value="";
name.value="";
reg.value="";
from.value="";
to.value="";
cargo.value="";
country.value="";
resultBox.innerHTML="🚀 جاهز";
if(window.map){window.map.remove();}
}

// 🧠 قراءة ذكية
function smartParse(){

let text = pasteData.value;
text = text.replace(/\s+/g," ").trim();

let lines = text.split("\n").map(l=>l.trim()).filter(l=>l.length>2);

// المشغل
let operator = "";
for(let line of lines){
let l = line.toLowerCase();
if(l.includes("air")||l.includes("aviation")||l.includes("charter")||l.includes("ltd")||l.includes("a.s")){
operator = line;
break;
}
}
if(!operator) operator = lines[0] || "";

// التسجيل
let regMatch = text.match(/\b([A-Z0-9]{1,2}-[A-Z0-9]{2,5})\b/i);
let regVal = regMatch ? regMatch[0].toUpperCase() : "";

// المطارات
let airports = text.match(/\b[A-Z]{4}\b/g) || [];
let ignore = ["CALL","DATE","FROM","TO","TYPE","FLIGHT"];
airports = airports.filter(a=>!ignore.includes(a));

let fromVal = airports[0] || "";
let toVal = airports[1] || "";

// الشحن
let cargoVal = "";
if(text.toLowerCase().includes("lithium")) cargoVal="lithium batteries";
else if(text.toLowerCase().includes("cargo")) cargoVal="cargo";

// الدولة (محسنة)
let countryVal = "";
if(regVal.startsWith("4X")) countryVal="israel";
if(regVal.startsWith("EP")) countryVal="iran";
if(regVal.startsWith("RA")) countryVal="russia";
if(regVal.startsWith("OK")) countryVal="czech";
if(regVal.startsWith("YK")) countryVal="syria";

// قراءة من النص
if(text.toLowerCase().includes("syria")) countryVal="syria";
if(text.toLowerCase().includes("iran")) countryVal="iran";
if(text.toLowerCase().includes("israel")) countryVal="israel";

// تعبئة
name.value = operator;
reg.value = regVal;
from.value = fromVal;
to.value = toVal;
cargo.value = cargoVal;
country.value = countryVal;

// رسم
drawRoute(fromVal,toVal);

// AI
analyzeWithAI(text, true);
}

// ✈️ تحليل
function analyze(){

let nameVal = name.value.toLowerCase();
let regVal = reg.value.toUpperCase();
let countryVal = country.value.toLowerCase();
let fromVal = from.value.toUpperCase();
let toVal = to.value.toUpperCase();
let cargoVal = cargo.value.toLowerCase();

let risk = "منخفض 🟢";
let reasons = [];

// حظر دولي
let banned = ["iran","syria","north korea","russia"];
if(banned.includes(countryVal)){
risk = "مرفوض ❌";
reasons.push("🚫 دولة محظورة");
}

// تسجيل
if(regVal.startsWith("EP")){
risk = "مرفوض ❌";
reasons.push("🚫 تسجيل إيراني");
}

// إسرائيل
if(regVal.startsWith("4X") || countryVal.includes("israel")){
risk = "مراجعة ⚠️";
reasons.push("✈️ تسجيل إسرائيلي");
}

// مسار
let restricted = ["LL","EP","SY","RU"];
if(restricted.some(r => fromVal.startsWith(r) || toVal.startsWith(r))){
risk = "مراجعة ⚠️";
reasons.push("🌍 مسار حساس");
}

// شحن
if(cargoVal.includes("battery")){
risk = "عالي 🔴";
reasons.push("⚠️ مواد خطرة");
}

// قرار
let decision="✔ APPROVE";
if(risk.includes("❌")) decision="❌ REJECT";
else if(risk.includes("⚠️")) decision="⚠️ REVIEW";

// عرض
resultBox.innerHTML = `
🚨 مستوى الخطورة: ${risk}<br><br>
👤 المشغل: ${nameVal || "غير معروف"}<br>
🛩️ التسجيل: ${regVal || "غير معروف"}<br>
🌍 المسار: ${fromVal} → ${toVal}<br><br>
📌 الأسباب:<br>
${reasons.length ? reasons.map(r=>"• "+r).join("<br>") : "• لا يوجد"}<br><br>
📋 القرار:<br>${decision}
`;

// رادار (محسن)
if(fromVal && toVal){
radarFrame.src = "https://www.flightradar24.com/data/flights/"+fromVal.toLowerCase()+"-"+toVal.toLowerCase();
}
}

// ✈️ خريطة
function drawRoute(from,to){

let coords = {
OJAI:[31.7,35.99],
HESH:[27.97,34.39],
OSDI:[33.41,36.52],
OIII:[35.42,51.15],
LFKJ:[41.92,8.8],
OMSJ:[25.33,55.52],
OMAL:[24.43,54.65],
LLBG:[32.0,34.87],
EGLL:[51.47,-0.45],
KJFK:[40.64,-73.78],
LFPG:[49.00,2.55],
EDDF:[50.03,8.57],
RJTT:[35.55,139.78]
};

if(!coords[from] || !coords[to]) return;

if(window.map){window.map.remove();}

window.map = L.map('map').setView(coords[from],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(window.map);

L.marker(coords[from]).addTo(window.map).bindPopup("FROM: "+from);
L.marker(coords[to]).addTo(window.map).bindPopup("TO: "+to);

L.polyline([coords[from], coords[to]]).addTo(window.map);
}

// 🤖 AI ذكي
async function analyzeWithAI(text, fillFields=false){

try{
let response = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer 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
},
body: JSON.stringify({
model:"gpt-4o-mini",
messages:[
{
role:"system",
content:`Extract flight data as JSON:
{"operator":"","registration":"","country":"","from":"","to":"","cargo":""}`
},
{role:"user",content:text}
]
})
});

let data = await response.json();
let content = data.choices?.[0]?.message?.content;

if(!content) return;

let parsed;
try{
parsed = JSON.parse(content);
}catch{
console.log("AI not JSON");
return;
}

// تعبئة
if(fillFields){
if(parsed.operator) name.value = parsed.operator;
if(parsed.registration) reg.value = parsed.registration;
if(parsed.country) country.value = parsed.country;
if(parsed.from) from.value = parsed.from;
if(parsed.to) to.value = parsed.to;
if(parsed.cargo) cargo.value = parsed.cargo;

// إعادة رسم
drawRoute(from.value,to.value);
}

console.log("AI SUCCESS", parsed);

}catch(e){
console.log("AI ERROR");
}

}

</script>

</body>
</html>
